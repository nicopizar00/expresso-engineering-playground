# Continuous Integration — mini-commerce engineering playground.
#
# Quality gates map 1:1 to docs/quality-strategy/README.md.
# Lint, build, and unit tests now run for real (no `|| true`). Contract and
# E2E job bodies remain stubs — they'll fail loudly until wired.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

  lint:
    name: Lint + format + typecheck
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format
      - run: pnpm typecheck

  test-unit:
    name: Unit + integration tests
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm test:integration

  build:
    name: Build all packages
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  python:
    name: Python orchestrator (pg) — ruff + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install --quiet "ruff==0.7.4"
      - name: Lint
        run: ruff check scripts/pg
      - name: Unit tests
        # unittest discover requires the start dir to be the parent so the
        # `pg` package is importable.
        run: cd scripts && python -m unittest discover -s pg/tests -p 'test_*.py' -v

  lint-docker:
    name: Hadolint Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint BFF Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/bff/Dockerfile
          # DL3018 (pin apk versions) is overly strict for a workspace base.
          ignore: DL3018
      - name: Lint web Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/web/Dockerfile
          ignore: DL3018
      - name: Lint visualizer-3d Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/visualizer-3d/Dockerfile

  contract:
    name: Contract verification
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:contract

  e2e-smoke:
    name: E2E smoke (Playwright)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo 'TODO: start ephemeral stack via infra/docker/compose.yaml and run @smoke Playwright tag'

  perf-smoke:
    name: Performance smoke (k6)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Start BFF stack
        run: |
          docker compose -f infra/docker/compose.yaml up -d
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3001/health >/dev/null; then
              echo "BFF is healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "BFF did not become healthy within 60s" >&2
          docker compose -f infra/docker/compose.yaml ps
          docker compose -f infra/docker/compose.yaml logs --tail=200
          exit 1
      - name: Run k6 smoke
        env:
          BASE_URL: http://host.docker.internal:3001
        run: |
          docker compose -f infra/docker/compose.performance.yaml run --rm \
            -e BASE_URL=$BASE_URL \
            k6 run /scripts/scenarios/smoke/smoke.js
      - name: Tear down stack
        if: always()
        run: docker compose -f infra/docker/compose.yaml down --volumes
