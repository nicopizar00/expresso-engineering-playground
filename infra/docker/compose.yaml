# Local development stack for the mini-commerce engineering playground.
#
# Bring up the full stack:
#   docker compose -f infra/docker/compose.yaml up
#
# Bring up only Postgres (run the BFF locally with `pnpm --filter @mini-commerce/bff dev`):
#   docker compose -f infra/docker/compose.yaml up postgres
#
# Conventions:
#   - All credentials are sourced from a local .env file (gitignored).
#   - No real URLs, image tags, or company names are committed.
#   - Versions are pinned conservatively to public, well-known images.
#
# Persistence note: Postgres is provisioned and reachable, but the BFF does
# NOT yet read from it (responses are mocked in-memory). The service exists
# so the connection wiring lands in one PR rather than two.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      # TODO: source these from a local .env file. Defaults below are
      # intentionally weak placeholders for local dev only.
      POSTGRES_USER: playground
      POSTGRES_PASSWORD: playground
      POSTGRES_DB: mini_commerce_playground
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playground -d mini_commerce_playground"]
      interval: 5s
      timeout: 5s
      retries: 10

  bff:
    build:
      context: ../..
      dockerfile: apps/bff/Dockerfile
    environment:
      PORT: "3001"
      # Connection string is wired now so future Prisma work has a target.
      DATABASE_URL: postgres://playground:playground@postgres:5432/mini_commerce_playground
      # TODO: point to otel-collector once telemetry.ts initializes the SDK.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  otel-collector:
    # TODO: switch to the contrib image once a concrete pipeline is defined.
    image: otel/opentelemetry-collector:latest
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ../observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP

  # visualizer-3d — opt-in static frontend that renders a Three.js room and
  # consumes /visualization-data from the BFF. Gated behind a Compose profile
  # so the default `docker compose up` still brings up the same lean app +
  # observability stack as before. Bring it up with:
  #   docker compose -f infra/docker/compose.yaml --profile visualizer up -d
  # or via the wrapper scripts (scripts/visualizer-up.sh, scripts/full-up.sh).
  visualizer-3d:
    profiles: ["visualizer"]
    build:
      context: ../../apps/visualizer-3d
    environment:
      # The browser is on the host, so the BFF address must be the
      # host-reachable URL (NOT the in-container service name `bff`).
      VIZ_API_BASE_URL: ${VIZ_API_BASE_URL:-http://localhost:3001}
    ports:
      - "3002:80"

  # TODO (future):
  #   - web:    build context apps/web, depends_on bff
  #   - prometheus / grafana / tempo / loki for the observability stack

volumes:
  postgres-data:

# The default network is named explicitly so it can be referenced as
# `external: true` from infra/docker/compose.performance.yaml. The
# generated name would otherwise depend on the project directory and be
# unstable across machines.
networks:
  default:
    name: mini_commerce_default
