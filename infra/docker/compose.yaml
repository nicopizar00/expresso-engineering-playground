# Local development stack for the mini-commerce engineering playground.
#
# Quick-start:
#   pnpm pg:up          # core stack (postgres + otel-collector + bff)
#   pnpm pg:up web      # + Next.js web app
#   pnpm pg:up full     # + web + visualizer-3d
#   pnpm pg:dev         # docker compose watch (hot-reload for bff + web)
#
# All credentials and ports are sourced from the root .env file (gitignored).
# Copy .env.example → .env before first run: cp .env.example .env
#
# Conventions:
#   - Credentials use ${VAR:-default} so the stack works without a .env.
#   - Versions are pinned conservatively to public, well-known images.
#   - Services with no profile are always started; profiled services are
#     opt-in (activated by pnpm pg:up <target> or --profile <name>).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-playground}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-playground}
      POSTGRES_DB: ${POSTGRES_DB:-mini_commerce_playground}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  bff:
    build:
      context: ../..
      dockerfile: apps/bff/Dockerfile
    environment:
      PORT: "${BFF_PORT:-3001}"
      DATABASE_URL: postgres://${POSTGRES_USER:-playground}:${POSTGRES_PASSWORD:-playground}@postgres:5432/${POSTGRES_DB:-mini_commerce_playground}
      # In-container Docker network address; root .env may set this to
      # localhost for host-side processes (k6 host-mode etc.) but the BFF
      # container must reach the collector by service name. Hardcoded so
      # a user-supplied .env value does not silently break tracing.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "${BFF_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  web:
    profiles: [web]
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      # The web server proxies to the other containers over the internal Docker
      # network (next.config.mjs rewrites). These targets are resolved when the
      # config loads, so the production build (pg:up web/full) needs them as
      # build args. They are in-container service names, NOT host ports.
      # NEXT_PUBLIC_VISUALIZER_URL stays host-reachable: it only feeds the
      # "open standalone in a new tab" link, which the host browser follows.
      args:
        BFF_INTERNAL_URL: ${BFF_INTERNAL_URL:-http://bff:3001}
        VISUALIZER_INTERNAL_URL: ${VISUALIZER_INTERNAL_URL:-http://visualizer-3d:80}
        NEXT_PUBLIC_VISUALIZER_URL: ${NEXT_PUBLIC_VISUALIZER_URL:-http://localhost:3002}
        # Gate for the Admin link in the header and /dev page. Empty → hidden.
        NEXT_PUBLIC_PRISMA_STUDIO_URL: ${NEXT_PUBLIC_PRISMA_STUDIO_URL-}
    environment:
      PORT: "${WEB_PORT:-3000}"
      # Runtime values used by the dev (watch) stage, where `next dev` reads
      # process.env live. The production standalone server uses the baked build
      # args above.
      BFF_INTERNAL_URL: ${BFF_INTERNAL_URL:-http://bff:3001}
      VISUALIZER_INTERNAL_URL: ${VISUALIZER_INTERNAL_URL:-http://visualizer-3d:80}
      NEXT_PUBLIC_VISUALIZER_URL: ${NEXT_PUBLIC_VISUALIZER_URL:-http://localhost:3002}
      NEXT_PUBLIC_PRISMA_STUDIO_URL: ${NEXT_PUBLIC_PRISMA_STUDIO_URL-}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      bff:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  otel-collector:
    # contrib image carries the prometheus exporter we need for the metrics
    # pipeline. Pinned to a known-good tag — bump deliberately.
    image: otel/opentelemetry-collector-contrib:0.110.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ../observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP
      - "8889:8889"  # prometheus exporter (scraped by prometheus svc)

  # visualizer-3d — opt-in static frontend that renders a Three.js room and
  # consumes /visualization-data from the BFF.
  # Activated by: pnpm pg:up viz  (or pnpm pg:up full)
  # Legacy alias: --profile visualizer still works.
  visualizer-3d:
    profiles: [visualizer, viz]
    build:
      context: ../../apps/visualizer-3d
    environment:
      # The browser is on the host, so the BFF address must be the
      # host-reachable URL (NOT the in-container service name `bff`).
      VIZ_API_BASE_URL: ${VIZ_API_BASE_URL:-http://localhost:3001}
    ports:
      - "${VIZ_PORT:-3002}:80"

  # prisma-studio — opt-in admin GUI for direct DB inspection/editing.
  # Activated by: pnpm pg:up admin  (or pnpm pg:up full)
  # Reuses the BFF Dockerfile `dev` stage so prisma client + schema are
  # already available; no separate image needed.
  #
  # WARNING: Studio writes directly to Postgres via the Prisma client. It does
  # NOT go through CatalogService/OrdersService, so DomainEventsModule never
  # fires and the SSE-driven visualizer will not react to edits made here
  # until the page is reloaded. Use the BFF /dev API console for state-machine-
  # safe edits.
  prisma-studio:
    profiles: [admin]
    build:
      context: ../..
      dockerfile: apps/bff/Dockerfile
      target: dev
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-playground}:${POSTGRES_PASSWORD:-playground}@postgres:5432/${POSTGRES_DB:-mini_commerce_playground}
    ports:
      - "${STUDIO_PORT:-5555}:5555"
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        "pnpm",
        "--filter",
        "@mini-commerce/bff",
        "exec",
        "prisma",
        "studio",
        "--port",
        "5555",
        "--hostname",
        "0.0.0.0",
        "--browser",
        "none",
      ]

  # ── Observability profile (opt-in via `./dev up obs` or `./dev up full`) ──
  #
  # Tempo stores traces locally; Prometheus scrapes the otel-collector;
  # Grafana auto-provisions Tempo + Prometheus datasources and a starter
  # BFF dashboard. None of these services are required for the BFF to run —
  # they only kick in when the user opts in.

  tempo:
    profiles: [obs]
    image: grafana/tempo:2.6.0
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ../observability/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "${TEMPO_PORT:-3200}:3200"  # HTTP API (used by `./dev hack trace`)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3200/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  prometheus:
    profiles: [obs]
    image: prom/prometheus:v2.55.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=6h"
    volumes:
      - ../observability/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/-/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  grafana:
    profiles: [obs]
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_FEATURE_TOGGLES_ENABLE: "traceqlEditor"
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3030}:3000"
    depends_on:
      prometheus:
        condition: service_started
      tempo:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

volumes:
  postgres-data:
  tempo-data:
  prometheus-data:
  grafana-data:

# The default network is named explicitly so it can be referenced as
# `external: true` from infra/docker/compose.performance.yaml. The
# generated name would otherwise depend on the project directory and be
# unstable across machines.
networks:
  default:
    name: mini_commerce_default
