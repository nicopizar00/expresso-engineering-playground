# Local development stack for the mini-commerce engineering playground.
#
# Quick-start:
#   pnpm pg:up          # core stack (postgres + otel-collector + bff)
#   pnpm pg:up web      # + Next.js web app
#   pnpm pg:up full     # + web + visualizer-3d
#   pnpm pg:dev         # docker compose watch (hot-reload for bff + web)
#
# All credentials and ports are sourced from the root .env file (gitignored).
# Copy .env.example → .env before first run: cp .env.example .env
#
# Conventions:
#   - Credentials use ${VAR:-default} so the stack works without a .env.
#   - Versions are pinned conservatively to public, well-known images.
#   - Services with no profile are always started; profiled services are
#     opt-in (activated by pnpm pg:up <target> or --profile <name>).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-playground}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-playground}
      POSTGRES_DB: ${POSTGRES_DB:-mini_commerce_playground}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  bff:
    build:
      context: ../..
      dockerfile: apps/bff/Dockerfile
    environment:
      PORT: "${BFF_PORT:-3001}"
      DATABASE_URL: postgres://${POSTGRES_USER:-playground}:${POSTGRES_PASSWORD:-playground}@postgres:5432/${POSTGRES_DB:-mini_commerce_playground}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
    ports:
      - "${BFF_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  web:
    profiles: [web]
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      # NEXT_PUBLIC_* are inlined into the client bundle at build time, so the
      # production build (pg:up web/full) needs them as build args. The browser
      # runs on the host, so these point at host-reachable ports, NOT the
      # in-container service names.
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}
        NEXT_PUBLIC_VISUALIZER_URL: ${NEXT_PUBLIC_VISUALIZER_URL:-http://localhost:3002}
    environment:
      PORT: "${WEB_PORT:-3000}"
      # Runtime values used by the dev (watch) stage, where `next dev` reads
      # process.env live. Ignored by the production standalone server, which
      # relies on the baked build args above.
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}
      NEXT_PUBLIC_VISUALIZER_URL: ${NEXT_PUBLIC_VISUALIZER_URL:-http://localhost:3002}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      bff:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  otel-collector:
    # TODO: switch to the contrib image once a concrete pipeline is defined.
    image: otel/opentelemetry-collector:latest
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ../observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP

  # visualizer-3d — opt-in static frontend that renders a Three.js room and
  # consumes /visualization-data from the BFF.
  # Activated by: pnpm pg:up viz  (or pnpm pg:up full)
  # Legacy alias: --profile visualizer still works.
  visualizer-3d:
    profiles: [visualizer, viz]
    build:
      context: ../../apps/visualizer-3d
    environment:
      # The browser is on the host, so the BFF address must be the
      # host-reachable URL (NOT the in-container service name `bff`).
      VIZ_API_BASE_URL: ${VIZ_API_BASE_URL:-http://localhost:3001}
    ports:
      - "${VIZ_PORT:-3002}:80"

  # TODO (future): prometheus / grafana / tempo / loki for observability stack

volumes:
  postgres-data:

# The default network is named explicitly so it can be referenced as
# `external: true` from infra/docker/compose.performance.yaml. The
# generated name would otherwise depend on the project directory and be
# unstable across machines.
networks:
  default:
    name: mini_commerce_default
