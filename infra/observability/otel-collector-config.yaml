# OpenTelemetry Collector pipeline.
#
# Traces  → Tempo (OTLP gRPC) when the `obs` profile is up.
# Metrics → Prometheus exporter on :8889. Prometheus scrapes that endpoint.
# Logs    → debug exporter (stdout). Loki is a future iteration.
#
# When the `obs` profile is NOT up, the otlp/tempo exporter cannot connect
# and silently drops traces. The collector keeps running so the rest of the
# stack is unaffected — `./dev up obs` is required for trace querying.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
    sending_queue:
      enabled: true
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 5m
  prometheus:
    endpoint: 0.0.0.0:8889
    # Resource attributes flow through to Prometheus labels so we can filter
    # by service_name in queries.
    resource_to_telemetry_conversion:
      enabled: true
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
