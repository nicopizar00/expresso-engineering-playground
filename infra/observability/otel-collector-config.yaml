# OpenTelemetry collector placeholder configuration.
#
# This is intentionally minimal: it accepts OTLP over gRPC/HTTP and logs
# everything to the collector's stdout. Real exporters (Tempo, Prometheus,
# Loki) will be wired in the next iteration.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  # TODO: replace with real backends (Tempo, Prometheus, Loki).
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
