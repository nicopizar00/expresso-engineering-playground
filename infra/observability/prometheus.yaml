# Prometheus scrape config — pulls OTLP-translated metrics from the
# otel-collector. The collector exposes the prometheus exporter on :8889;
# every BFF + k6 metric flows through that bridge.

global:
  scrape_interval: 5s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  # Prometheus self-scrape so we can verify the stack is healthy.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
